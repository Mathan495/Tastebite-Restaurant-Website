{% extends 'base.html' %}
{% load static %}
{% block content %}
<section class="min-vh-100 d-flex align-items-center bg-light py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6">
                {% include 'inc/message.html' %}
                <div class="card border-0 shadow-lg rounded-4">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <h1 class="fw-bold text-warning">
                                TasteBite
                            </h1>

                            <h3 class="fw-bold">
                                Create Account
                            </h3>

                            <p class="text-muted">
                                Join us to reserve tables and order delicious food
                            </p>

                        </div>
                        <form method="POST">

                            {% csrf_token %}

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label fw-semibold">
                                        First Name
                                    </label>

                                    <input type="text"
                                           name="first_name"
                                           class="form-control"
                                           placeholder="Enter First Name"
                                           required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label fw-semibold">
                                        Last Name
                                    </label>

                                    <input type="text"
                                           name="last_name"
                                           class="form-control"
                                           placeholder="Enter Last Name"
                                           required>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Username
                                </label>

                                <input type="text"
                                       name="username"
                                       class="form-control"
                                       placeholder="Choose Username"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       placeholder="Enter Email"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Phone Number
                                </label>

                                <input type="tel"
                                       name="phone"
                                       class="form-control"
                                       placeholder="Enter Phone Number"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <input type="password"
                                       name="password1"
                                       class="form-control"
                                       placeholder="Create Password"
                                       required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Confirm Password
                                </label>

                                <input type="password"
                                       name="password2"
                                       class="form-control"
                                       placeholder="Confirm Password"
                                       required>

                            </div>

                            <button type="submit"
                                    class="btn btn-warning btn-lg w-100 fw-semibold">
                                Create Account
                            </button>

                        </form>

                        <hr>

                        <div class="text-center">

                            <p class="mb-0">
                                Already have an account?
                                <a href="{% url 'login' %}"
                                   class="text-decoration-none fw-semibold">
                                    Login
                                </a>
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
{% endblock %}
